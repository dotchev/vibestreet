name: Weekly trading run

on:
  schedule:
    # Every Saturday at 05:00 UTC. Cron fields: min hour dom month dow (0=Sun, 6=Sat).
    - cron: '0 5 * * 6'
  workflow_dispatch:  # allow manual runs from the Actions tab

permissions:
  contents: write  # required to commit results back to the repo

concurrency:
  group: weekly-trading-run
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node (for Claude Code CLI)
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Python (for verify.py)
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Record starting commit
        id: base
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Run trading agent
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -o pipefail  # surface claude's exit code through the pipe
          claude \
            --model opus \
            --effort max \
            --dangerously-skip-permissions \
            --verbose \
            --output-format stream-json \
            -p "Do a weekly run per README.md." \
            | tee run.jsonl \
            | jq -r '
                select(.type == "assistant")
                | .message.content[]?
                | if .type == "thinking" then "🧠 THINKING:\n" + .thinking
                  elif .type == "text" then "💬 " + .text
                  elif .type == "tool_use" then "🔧 " + .name + " " + (.input | tostring)
                  else empty end
              '

      - name: Upload run log
        if: always()  # capture the log even if the agent or verify step fails
        uses: actions/upload-artifact@v7
        with:
          name: run-log-${{ github.run_id }}
          path: run.jsonl
          if-no-files-found: warn
          retention-days: 90

      - name: Verify agent behaved
        run: |
          # The agent must not use git — the workflow owns commits and pushes.
          # A moved HEAD means the agent committed something itself.
          if [ "$(git rev-parse HEAD)" != "${{ steps.base.outputs.sha }}" ]; then
            echo "::error::Agent used git (HEAD moved) — it must not run git. See README hard rules."
            exit 1
          fi
          # The agent must actually change files each run (run.jsonl is gitignored,
          # so it does not count toward this check).
          if [ -z "$(git status --porcelain)" ]; then
            echo "::error::Agent modified no files this run — nothing to commit."
            exit 1
          fi

      - name: Check protected files unchanged
        run: |
          changed=$(git diff --name-only -- README.md verify.py '.github/*')
          if [ -n "$changed" ]; then
            echo "::error::Protected files were modified by the agent:"
            git diff -- README.md verify.py '.github/*'
            exit 1
          fi

      - name: Verify results
        run: python3 verify.py

      - name: Commit and push results
        run: |
          git config user.name "vibestreet-bot"
          git config user.email "vibestreet-bot@users.noreply.github.com"
          git add -A
          # No-change case is already caught by the "Verify agent behaved" step.
          git commit -m "weekly run: $(date -u +%Y-%m-%d)"
          git push
