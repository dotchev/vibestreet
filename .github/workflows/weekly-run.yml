name: Weekly trading run

on:
  schedule:
    # Every Saturday at 05:00 UTC. Cron fields: min hour dom month dow (0=Sun, 6=Sat).
    - cron: '0 5 * * 6'
  workflow_dispatch:  # allow manual runs from the Actions tab

permissions:
  contents: write  # required to commit results back to the repo

concurrency:
  group: weekly-trading-run
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node (for Claude Code CLI)
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Python (for verify.py)
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run trading agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude \
            --model claude-opus-4-7 \
            --effort max \
            --dangerously-skip-permissions \
            --verbose \
            -p "Do a weekly run per README.md."

      - name: Verify results
        run: python3 verify.py

      - name: Commit and push results
        run: |
          git config user.name "vibestreet-bot"
          git config user.email "vibestreet-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes produced — nothing to commit."
            exit 0
          fi
          git commit -m "weekly run: $(date -u +%Y-%m-%d)"
          git push
